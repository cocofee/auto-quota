# auto-quota 一键部署
#
# 启动命令:
#   docker-compose up -d              # 后台启动所有服务
#   docker-compose up -d --build      # 重新构建后启动
#   docker-compose logs -f backend    # 查看后端日志
#   docker-compose down               # 停止所有服务
#
# 首次启动后需要初始化数据库:
#   docker-compose exec backend python -c "
#     from app.database import engine, Base
#     from app.models import User, Task, MatchResult
#     import asyncio
#     asyncio.run(engine.begin().__aenter__().then(lambda c: c.run_sync(Base.metadata.create_all)))
#   "
#   或者用 Alembic:
#   docker-compose exec backend alembic upgrade head
#
# 服务端口:
#   http://localhost:3000   — 前端页面（Nginx）
#   http://localhost:8000   — 后端API（直连，调试用）
#   http://localhost:8000/docs — API文档（Swagger）

services:
  # ============================================================
  # PostgreSQL 数据库
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: autoquota-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: autoquota
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoquota}
      POSTGRES_DB: autoquota
    volumes:
      # 数据持久化（不会因容器删除而丢失）
      - postgres_data:/var/lib/postgresql/data
    ports:
      # 开发时可以直接连数据库调试，生产可去掉此映射
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoquota"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis（Celery消息队列）
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: autoquota-redis
    restart: unless-stopped
    # ports:  # 6379 端口被 Hyper-V 保留，Redis 只需容器内部通信，不需要暴露
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # 后端 API（FastAPI）
  # ============================================================
  backend:
    image: auto-quota-app:latest
    build:
      context: .
      dockerfile: web/backend/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    container_name: autoquota-backend
    restart: unless-stopped
    # FastAPI 启动命令
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
      --log-level info
    working_dir: /app/web/backend
    # ports:
    #   - "8000:8000"  # Hyper-V保留了8000端口，且后端通过Nginx反代访问，无需暴露
    env_file:
      # 先加载 .env（API Key等共享密钥）
      - .env
    environment:
      # environment 优先级高于 env_file，生产模型配置写这里，不用改 .env
      # 数据库连接（Docker内部网络，用服务名postgres作为主机名）
      DATABASE_URL: postgresql+asyncpg://autoquota:${POSTGRES_PASSWORD:-autoquota}@postgres:5432/autoquota
      # Redis连接
      REDIS_URL: redis://redis:6379/0
      # JWT密钥（生产环境必须设固定值）
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      # CORS（允许前端Nginx容器访问）
      CORS_ORIGINS: http://localhost:3210,http://localhost:3000,http://localhost:5173
      # 生产模型配置（覆盖.env中的开发配置，部署时自动用国产模型）
      AGENT_LLM: qwen
      VERIFY_LLM: kimi
      VERIFY_MODEL: kimi-k2.5
      # 关闭向量搜索（Docker精简镜像没装chromadb/sentence_transformers，纯BM25足够）
      VECTOR_ENABLED: "false"
      # 已验证的 pure-search 基线：LTR_V2 + genericity stats
      LTR_V2_ENABLED: "1"
      LTR_V2_MODEL_PATH: /app/output/ltr/model_v2/ltr_v2_model.txt
      LTR_V2_FEATURES_PATH: /app/output/ltr/model_v2/ltr_v2_features.json
      LTR_GENERICITY_STATS_PATH: /app/data/ltr_quota_genericity.json
    volumes:
      # 挂载数据目录（定额库数据、上传文件、输出结果）
      - ./data:/app/data
      - ./db:/app/db
      - ./output:/app/output
      # 日志持久化（容器重启后日志不丢失）
      - ./logs:/app/logs
      # Benchmark历史记录（前端跑分趋势页面读取）
      - ./tests:/app/tests
      # 原始造价文件（本地开发用，和懒猫的 /lzcapp/var/raw_files 对应）
      - ./raw_files:/app/raw_files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================
  # Celery Worker（后台匹配任务执行）
  # ============================================================
  celery-worker:
    image: auto-quota-app:latest
    container_name: autoquota-celery
    restart: unless-stopped
    # Celery Worker 启动命令（Docker容器是Linux环境，用prefork池支持多进程并发）
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --concurrency=1
      --pool=solo
    working_dir: /app/web/backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://autoquota:${POSTGRES_PASSWORD:-autoquota}@postgres:5432/autoquota
      REDIS_URL: redis://redis:6379/0
      # 生产模型配置（和backend保持一致）
      AGENT_LLM: qwen
      VERIFY_LLM: kimi
      VERIFY_MODEL: kimi-k2.5
      # 关闭向量搜索（Docker精简镜像没装chromadb/sentence_transformers，纯BM25足够）
      VECTOR_ENABLED: "false"
      # 与 backend 保持一致，启用已验证的 LTR_V2 基线
      LTR_V2_ENABLED: "1"
      LTR_V2_MODEL_PATH: /app/output/ltr/model_v2/ltr_v2_model.txt
      LTR_V2_FEATURES_PATH: /app/output/ltr/model_v2/ltr_v2_features.json
      LTR_GENERICITY_STATS_PATH: /app/data/ltr_quota_genericity.json
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./output:/app/output
      # 日志持久化（和后端共享同一个 logs 目录）
      - ./logs:/app/logs
      # 模型缓存持久化（避免每次重建容器都重新下载 ~2GB 的AI模型）
      - model_cache:/root/.cache
      # 原始造价文件
      - ./raw_files:/app/raw_files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================
  # 前端（Nginx 托管 React 静态文件 + 反向代理 API）
  # ============================================================
  frontend:
    build:
      context: web/frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:alpine}
    container_name: autoquota-frontend
    restart: unless-stopped
    ports:
      # 3000/3200被Hyper-V保留，改用3210
      - "3210:80"
    depends_on:
      - backend

# 数据卷（持久化存储）
volumes:
  postgres_data:
  # AI模型缓存（HuggingFace向量模型、重排序模型、ChromaDB ONNX模型）
  # 容器重建后不用重新下载，节省约10分钟启动时间
  model_cache:
