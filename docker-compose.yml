services:
  postgres:
    image: postgres:16-alpine
    container_name: autoquota-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: autoquota
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoquota}
      POSTGRES_DB: autoquota
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=C.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoquota"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autoquota-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: auto-quota-app:latest
    build:
      context: .
      dockerfile: web/backend/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    container_name: autoquota-backend
    restart: unless-stopped
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
      --reload
      --reload-dir /app/src
      --reload-dir /app/web/backend
      --reload-dir /app/tools
      --reload-dir /app/knowledge
      --log-level info
    working_dir: /app/web/backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://autoquota:${POSTGRES_PASSWORD:-autoquota}@postgres:5432/autoquota
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      CORS_ORIGINS: http://localhost:3300,http://127.0.0.1:3300,http://localhost:3210,http://127.0.0.1:3210,http://localhost:3000,http://localhost:5173
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      PYTHONIOENCODING: "utf-8"
      PYTHONUTF8: "1"
      TZ: Asia/Shanghai
      AGENT_LLM: qwen
      VERIFY_LLM: kimi
      VERIFY_MODEL: kimi-k2.5
      MATCH_BACKEND: "local"
      VECTOR_ENABLED: "true"
      LTR_V2_ENABLED: "1"
      LTR_V2_MODEL_PATH: /app/output/ltr/model_v2/ltr_v2_model.txt
      LTR_V2_FEATURES_PATH: /app/output/ltr/model_v2/ltr_v2_features.json
      LTR_GENERICITY_STATS_PATH: /app/data/ltr_quota_genericity.json
    volumes:
      - ./config.py:/app/config.py
      - ./main.py:/app/main.py
      - ./docs:/app/docs
      - ./src:/app/src
      - ./tools:/app/tools
      - ./knowledge:/app/knowledge
      - ./web/backend:/app/web/backend
      - ./models:/app/models
      - ./data:/app/data
      - ./db:/app/db
      - ./output:/app/output
      - ./logs:/app/logs
      - ./tests:/app/tests
      - ./raw_files:/app/raw_files
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    image: auto-quota-app:latest
    container_name: autoquota-celery
    restart: unless-stopped
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --concurrency=1
      --pool=solo
    working_dir: /app/web/backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://autoquota:${POSTGRES_PASSWORD:-autoquota}@postgres:5432/autoquota
      REDIS_URL: redis://redis:6379/0
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      PYTHONIOENCODING: "utf-8"
      PYTHONUTF8: "1"
      TZ: Asia/Shanghai
      AGENT_LLM: qwen
      VERIFY_LLM: kimi
      VERIFY_MODEL: kimi-k2.5
      MATCH_BACKEND: "local"
      VECTOR_ENABLED: "true"
      LTR_V2_ENABLED: "1"
      LTR_V2_MODEL_PATH: /app/output/ltr/model_v2/ltr_v2_model.txt
      LTR_V2_FEATURES_PATH: /app/output/ltr/model_v2/ltr_v2_features.json
      LTR_GENERICITY_STATS_PATH: /app/data/ltr_quota_genericity.json
    volumes:
      - ./config.py:/app/config.py
      - ./main.py:/app/main.py
      - ./docs:/app/docs
      - ./src:/app/src
      - ./tools:/app/tools
      - ./knowledge:/app/knowledge
      - ./web/backend:/app/web/backend
      - ./models:/app/models
      - ./data:/app/data
      - ./db:/app/db
      - ./output:/app/output
      - ./logs:/app/logs
      - ./raw_files:/app/raw_files
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    container_name: autoquota-frontend
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -lc "if [ ! -d node_modules ] || ! find node_modules -mindepth 1 -print -quit | grep -q .; then npm ci --registry=https://registry.npmmirror.com; fi &&
      npm run dev -- --host 0.0.0.0 --port 3210"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      TZ: Asia/Shanghai
    volumes:
      - ./web/frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3300:3210"
    depends_on:
      - backend

volumes:
  postgres_data:
  model_cache:
  frontend_node_modules:
