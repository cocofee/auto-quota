# auto-quota 前端 Nginx 配置
#
# 功能：
# 1. 托管 React 静态文件（SPA 单页应用）
# 2. /api 请求反向代理到后端 FastAPI
# 3. SPA 路由支持（所有非文件请求返回 index.html）

server {
    listen 80;
    server_name _;
    charset utf-8;
    charset_types text/plain text/css application/json application/javascript text/javascript text/xml application/xml image/svg+xml;

    # 静态文件根目录（React 构建产物）
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源缓存（JS/CSS 文件名含 hash，可以长期缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 请求反向代理到后端
    # Docker 内部网络用服务名 "backend" 作为主机名
    location /api/ {
        proxy_pass http://__BACKEND_UPSTREAM__/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持（进度推送需要长连接）
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;

        # 上传文件体积限制（和后端 UPLOAD_MAX_MB 一致）
        client_max_body_size 30m;

        # 超时设置（匹配任务上传可能较慢）
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # index.html 不缓存（每次都从服务器获取，确保加载最新JS）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA 路由支持：所有非文件请求返回 index.html
    # React Router 的 BrowserRouter 需要这个配置
    location / {
        try_files $uri $uri/ /index.html;
        # 非静态资源也不缓存
        add_header Cache-Control "no-cache";
    }

    # 关闭 Nginx 版本号显示（安全加固）
    server_tokens off;

    # Gzip 压缩（减少传输体积）
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
