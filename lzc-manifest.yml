lzc-sdk-version: "0.1"
name: Auto Quota
package: cloud.lazycat.app.autoquota
version: 0.2.5
description: Auto quota web service
license: https://choosealicense.com/licenses/mit/
homepage:
author:
application:
  subdomain: autoquota
  routes:
    - /=http://frontend.cloud.lazycat.app.autoquota.lzcapp:80/

services:
  frontend:
    image: crpi-w9u53ghdxy8m3wgg.cn-hangzhou.personal.cr.aliyuncs.com/cocofee2026/auto-quota-frontend:latest
    depends_on:
      - backend

  backend:
    image: crpi-w9u53ghdxy8m3wgg.cn-hangzhou.personal.cr.aliyuncs.com/cocofee2026/auto-quota-app:latest
    command: sh -c "cd /app/web/backend && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --log-level info"
    environment:
      DATABASE_URL: postgresql+asyncpg://autoquota:autoquota@postgres:5432/autoquota
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      JWT_SECRET_KEY: "8OseAirAJYwPDPdryD4y_mWDItFZVp-5tywgeRdf5io"
      CORS_ORIGINS: http://frontend.cloud.lazycat.app.autoquota.lzcapp
      # UTF-8编码（解决Docker容器中文乱码/ascii编码错误）
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      PYTHONIOENCODING: "utf-8"
      # 关闭向量搜索（懒猫无GPU，CPU跑BGE太慢，纯BM25足够）
      VECTOR_ENABLED: "false"
      # 大模型配置：全部使用Claude Opus（中转直连）
      AGENT_LLM: claude
      MATCH_LLM: claude
      VERIFY_LLM: claude
      VERIFY_MODEL: claude-opus-4-6
      VERIFY_CONCURRENT: "3"
      QWEN_API_KEY: "sk-73d9053f50c44f07860736923cd5c11b"
      QWEN_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      QWEN_MODEL: qwen-plus
      KIMI_API_KEY: "sk-73d9053f50c44f07860736923cd5c11b"
      KIMI_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      KIMI_MODEL: kimi-k2.5
      CLAUDE_API_KEY: "sk-2f054a94bf58375bac459e0a8d24f24fbf757e4e559afd31a8b286d4121be585"
      CLAUDE_BASE_URL: "http://47.243.74.21:8080"
      CLAUDE_MODEL: claude-opus-4-6
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
      # Cookie安全配置（懒猫微服通过HTTPS提供服务）
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: "lax"
      # 好易支付配置（注册后填入）
      EPAY_PID: ""
      EPAY_KEY: ""
      EPAY_URL: ""
      EPAY_NOTIFY_BASE_URL: ""
      EPAY_RETURN_BASE_URL: ""
    binds:
      - /lzcapp/var/data:/app/data
      - /lzcapp/var/db:/app/db
      - /lzcapp/var/output:/app/output
      - /lzcapp/var/logs:/app/logs
      - /lzcapp/var/model_cache:/root/.cache
    depends_on:
      - postgres
      - redis

  celery-worker:
    image: crpi-w9u53ghdxy8m3wgg.cn-hangzhou.personal.cr.aliyuncs.com/cocofee2026/auto-quota-app:latest
    command: sh -c "cd /app/web/backend && celery -A app.celery_app worker --loglevel=info --concurrency=2 --pool=prefork"
    environment:
      DATABASE_URL: postgresql+asyncpg://autoquota:autoquota@postgres:5432/autoquota
      REDIS_URL: redis://redis:6379/0
      # UTF-8编码（解决Docker容器中文乱码/ascii编码错误）
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      PYTHONIOENCODING: "utf-8"
      # 关闭向量搜索（懒猫无GPU，CPU跑BGE太慢，纯BM25足够）
      VECTOR_ENABLED: "false"
      # 大模型配置：全部使用Claude Opus（中转直连）
      AGENT_LLM: claude
      MATCH_LLM: claude
      VERIFY_LLM: claude
      VERIFY_MODEL: claude-opus-4-6
      VERIFY_CONCURRENT: "3"
      QWEN_API_KEY: "sk-73d9053f50c44f07860736923cd5c11b"
      QWEN_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      QWEN_MODEL: qwen-plus
      KIMI_API_KEY: "sk-73d9053f50c44f07860736923cd5c11b"
      KIMI_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      KIMI_MODEL: kimi-k2.5
      CLAUDE_API_KEY: "sk-2f054a94bf58375bac459e0a8d24f24fbf757e4e559afd31a8b286d4121be585"
      CLAUDE_BASE_URL: "http://47.243.74.21:8080"
      CLAUDE_MODEL: claude-opus-4-6
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    binds:
      - /lzcapp/var/data:/app/data
      - /lzcapp/var/db:/app/db
      - /lzcapp/var/output:/app/output
      - /lzcapp/var/logs:/app/logs
      - /lzcapp/var/model_cache:/root/.cache
    depends_on:
      - postgres
      - redis

  postgres:
    image: crpi-w9u53ghdxy8m3wgg.cn-hangzhou.personal.cr.aliyuncs.com/cocofee2026/postgres:16-alpine
    environment:
      POSTGRES_USER: autoquota
      POSTGRES_PASSWORD: autoquota
      POSTGRES_DB: autoquota
    binds:
      - /lzcapp/var/postgres:/var/lib/postgresql/data

  redis:
    image: crpi-w9u53ghdxy8m3wgg.cn-hangzhou.personal.cr.aliyuncs.com/cocofee2026/redis:7-alpine
