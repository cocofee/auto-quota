lzc-sdk-version: "0.1"
name: Auto Quota
package: cloud.lazycat.app.autoquota
version: 0.2.33
description: Auto quota web service
license: https://choosealicense.com/licenses/mit/
homepage:
author:
application:
  subdomain: autoquota
  routes:
    - /=http://frontend.cloud.lazycat.app.autoquota.lzcapp:80/

services:
  frontend:
    image: crpi-w9u53ghdxy8m3wgg.cn-hangzhou.personal.cr.aliyuncs.com/cocofee2026/auto-quota-frontend:latest
    depends_on:
      - backend

  backend:
    image: crpi-w9u53ghdxy8m3wgg.cn-hangzhou.personal.cr.aliyuncs.com/cocofee2026/auto-quota-app:latest
    command: sh -c "cd /app/web/backend && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --log-level info"
    environment:
      DATABASE_URL: postgresql+asyncpg://autoquota:autoquota@postgres:5432/autoquota
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      JWT_SECRET_KEY: "8OseAirAJYwPDPdryD4y_mWDItFZVp-5tywgeRdf5io"
      CORS_ORIGINS: http://frontend.cloud.lazycat.app.autoquota.lzcapp
      # UTF-8编码
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      PYTHONIOENCODING: "utf-8"
      # 远程模式不需要向量搜索和大模型（全部在本地电脑上）
      VECTOR_ENABLED: "false"
      # Cookie安全配置（懒猫微服通过HTTPS提供服务）
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: "lax"
      # 远程匹配模式（算力在本地电脑，懒猫只做前端+调度）
      MATCH_BACKEND: "remote"
      LOCAL_MATCH_URL: "http://192.168.1.175:9527"
      LOCAL_MATCH_API_KEY: "f4d20d44381b4368"
    binds:
      - /lzcapp/var/output:/app/output
      - /lzcapp/var/logs:/app/logs
    depends_on:
      - postgres
      - redis

  celery-worker:
    image: crpi-w9u53ghdxy8m3wgg.cn-hangzhou.personal.cr.aliyuncs.com/cocofee2026/auto-quota-app:latest
    command: sh -c "cd /app/web/backend && celery -A app.celery_app worker --loglevel=info --concurrency=2 --pool=prefork"
    environment:
      DATABASE_URL: postgresql+asyncpg://autoquota:autoquota@postgres:5432/autoquota
      REDIS_URL: redis://redis:6379/0
      # UTF-8编码
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      PYTHONIOENCODING: "utf-8"
      # 远程模式不需要向量搜索和大模型
      VECTOR_ENABLED: "false"
      # 远程匹配模式（和backend保持一致）
      MATCH_BACKEND: "remote"
      LOCAL_MATCH_URL: "http://192.168.1.175:9527"
      LOCAL_MATCH_API_KEY: "f4d20d44381b4368"
    binds:
      - /lzcapp/var/output:/app/output
      - /lzcapp/var/logs:/app/logs
    depends_on:
      - postgres
      - redis

  postgres:
    image: crpi-w9u53ghdxy8m3wgg.cn-hangzhou.personal.cr.aliyuncs.com/cocofee2026/postgres:16-alpine
    environment:
      POSTGRES_USER: autoquota
      POSTGRES_PASSWORD: autoquota
      POSTGRES_DB: autoquota
    binds:
      - /lzcapp/var/postgres:/var/lib/postgresql/data

  redis:
    image: crpi-w9u53ghdxy8m3wgg.cn-hangzhou.personal.cr.aliyuncs.com/cocofee2026/redis:7-alpine
